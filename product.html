<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Aurora Journals</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- GLOBAL NAVIGATION HEADER -->
    <header class="site-header">
        <div class="nav-container">
            <!-- New Image Logo Integration -->
            <a href="index.html" class="logo-image-container">
                <img src="images/Logo.PNG" alt="Aurora Journals Logo" class="nav-logo-img">
            </a>
            
            <nav class="main-navigation">
                <a href="index.html" class="nav-link">Home</a>
                <a href="shop.html" class="nav-link">Shop All</a>
            </nav>

            <div class="header-actions">
                <button id="cart-trigger-node" class="cart-btn">
                    <span>Bag</span>
                    <span class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- DYNAMIC SINGLE PRODUCT PROFILE SCREEN -->
    <main class="content-container" style="margin-top: 140px;" id="dynamic-product-root">
        <div class="single-product-layout">
            <div class="detail-gallery-surface">
                <img id="dp-image" src="" alt="Loading..." onerror="this.src='https://via.placeholder.com/500x500?text=Aurora+Journals'">
            </div>
            <div class="detail-info-surface">
                <h1 id="dp-title" class="detail-product-title">Loading Product Parameters...</h1>
                <div id="dp-price" class="detail-product-price">$0.00</div>
                <p id="dp-desc" class="detail-product-description">Parsing database attributes...</p>
                
                <div class="purchase-matrix-row">
                    <button id="dp-action-btn" class="btn-primary" style="width: 100%; max-width: 320px;">Add Item To Bag</button>
                </div>
            </div>
        </div>
    </main>

    <!-- PERSISTENT SLIDE-OUT CART DRAWER -->
    <div id="cart-overlay-node" class="cart-overlay"></div>
    <div id="cart-drawer-node" class="cart-drawer">
        <div class="cart-drawer-header">
            <h2>Your Shopping Bag (<span class="cart-count">0</span>)</h2>
            <button id="cart-close-node" class="close-drawer-btn">&times;</button>
        </div>
        <div id="cart-items-wrapper" class="cart-items-container">
            <!-- Managed dynamically by script.js -->
        </div>
        <div class="cart-drawer-footer">
            <div class="cart-total-row">
                <span>Subtotal:</span>
                <span id="cart-running-total">$0.00</span>
            </div>
            <button class="btn-primary checkout-btn" onclick="alert('Checkout integration arriving soon!')">Proceed To Checkout</button>
        </div>
    </div>

    <script src="script.js"></script>

    <script type="text/javascript" src="https://payhip.com/payhip.js"></script>

</body>
</html>
