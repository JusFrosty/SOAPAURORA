<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop The Collection - Aurora Journals</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- GLOBAL NAVIGATION HEADER -->
    <header class="site-header">
        <div class="nav-container">
            <!-- New Image Logo Integration -->
            <a href="index.html" class="logo-image-container">
                <img src="images/Logo.png" alt="Aurora Journals Logo" class="nav-logo-img">
            </a>
            
            <nav class="main-navigation">
                <a href="index.html" class="nav-link">Home</a>
                <a href="shop.html" class="nav-link active">Shop All</a>
            </nav>

            <div class="header-actions">
                <button id="cart-trigger-node" class="cart-btn">
                    <span>Bag</span>
                    <span class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- STOREFRONT BROWSING INTERFACE -->
    <main class="content-container" style="margin-top: 120px;">
        <div class="shop-utility-header">
            <h1 class="storefront-title">The Complete Stationery Vault</h1>
            <div class="search-input-wrapper">
                <input type="text" id="shop-search-field" placeholder="Search journals, planners, layout templates...">
            </div>
        </div>

        <div id="shop-injection-target" class="product-grid">
            <!-- JavaScript dynamically renders full catalog items here -->
        </div>
    </main>

    <!-- PERSISTENT SLIDE-OUT CART DRAWER -->
    <div id="cart-overlay-node" class="cart-overlay"></div>
    <div id="cart-drawer-node" class="cart-drawer">
        <div class="cart-drawer-header">
            <h2>Your Shopping Bag (<span class="cart-count">0</span>)</h2>
            <button id="cart-close-node" class="close-drawer-btn">&times;</button>
        </div>
        <div id="cart-items-wrapper" class="cart-items-container">
            <!-- Managed dynamically by script.js -->
        </div>
        <div class="cart-drawer-footer">
            <div class="cart-total-row">
                <span>Subtotal:</span>
                <span id="cart-running-total">$0.00</span>
            </div>
            <button class="btn-primary checkout-btn" onclick="alert('Checkout integration arriving soon!')">Proceed To Checkout</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
