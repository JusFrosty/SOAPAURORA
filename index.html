<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Journals - High-Vibe Spiritual Stationery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- GLOBAL NAVIGATION HEADER -->
    <header class="site-header">
        <div class="nav-container">
            <!-- New Image Logo Integration -->
            <a href="index.html" class="logo-image-container">
                <img src="images/Logo.PNG" alt="Aurora Journals Logo" class="nav-logo-img">
            </a>
            
            <nav class="main-navigation">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="shop.html" class="nav-link">Shop All</a>
            </nav>

            <div class="header-actions">
                <button id="cart-trigger-node" class="cart-btn">
                    <span>Bag</span>
                    <span class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- HERO PROFILE SURFACE -->
    <section class="hero-surface">
        <div class="hero-content">
            <h1>Elevate Your Daily Devotional Workspace</h1>
            <p>High-energy, beautifully structured pink productivity toolkits designed to completely transform your quiet time and clear spiritual milestones.</p>
            <a href="shop.html" class="btn-primary">Shop The Collection</a>
        </div>
    </section>

    <!-- MAIN BESTSELLERS SECTION -->
    <main class="content-container">
        <h2 class="section-title">The Current Bestsellers</h2>
        <div id="bestseller-injection-target" class="product-grid">
            <!-- JavaScript dynamically renders product cards here -->
        </div>
    </main>

    <!-- PERSISTENT SLIDE-OUT CART DRAWER -->
    <div id="cart-overlay-node" class="cart-overlay"></div>
    <div id="cart-drawer-node" class="cart-drawer">
        <div class="cart-drawer-header">
            <h2>Your Shopping Bag (<span class="cart-count">0</span>)</h2>
            <button id="cart-close-node" class="close-drawer-btn">&times;</button>
        </div>
        <div id="cart-items-wrapper" class="cart-items-container">
            <!-- Managed dynamically by script.js -->
        </div>
        <div class="cart-drawer-footer">
            <div class="cart-total-row">
                <span>Subtotal:</span>
                <span id="cart-running-total">$0.00</span>
            </div>
            <button class="btn-primary checkout-btn" onclick="alert('Checkout integration arriving soon!')">Proceed To Checkout</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
